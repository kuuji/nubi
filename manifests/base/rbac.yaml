---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nubi-controller
rules:
  # CRD access for kopf
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # Manage task namespaces (nubi-* prefix enforced by controller)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # Manage workloads inside task namespaces
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Credentials and config
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Network isolation
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Resource quotas
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # TaskSpec CRD — read and update status
  - apiGroups: ["nubi.io"]
    resources: ["taskspecs"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["nubi.io"]
    resources: ["taskspecs/status"]
    verbs: ["get", "update", "patch"]
  # Events for kopf
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  # kopf peering (leader election)
  - apiGroups: ["kopf.dev"]
    resources: ["clusterkopfpeerings"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nubi-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nubi-controller
subjects:
  - kind: ServiceAccount
    name: nubi-controller
    namespace: nubi-system

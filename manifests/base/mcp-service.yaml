---
apiVersion: v1
kind: Service
metadata:
  name: nubi-mcp
  namespace: nubi-system
  labels:
    app.kubernetes.io/name: nubi-mcp
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/managed-by: nubi
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nubi-mcp
    app.kubernetes.io/component: mcp-server
  ports:
    - name: mcp
      port: 8080
      targetPort: 8080
      protocol: TCP

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: taskspecs.nubi.io
spec:
  group: nubi.io
  names:
    kind: TaskSpec
    listKind: TaskSpecList
    plural: taskspecs
    singular: taskspec
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Name
          type: string
          jsonPath: .metadata.name
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - description
                - type
                - inputs
              properties:
                description:
                  type: string
                type:
                  type: string
                  enum:
                    - code-change
                    - research
                    - infra
                    - investigation
                    - refactor
                priority:
                  type: string
                  enum:
                    - low
                    - normal
                    - high
                    - critical
                  default: normal
                inputs:
                  type: object
                  required:
                    - repo
                  properties:
                    repo:
                      type: string
                    branch:
                      type: string
                      default: main
                    files_of_interest:
                      type: array
                      items:
                        type: string
                      default: []
                constraints:
                  type: object
                  default: {}
                  properties:
                    timeout:
                      type: string
                      default: "300s"
                    total_timeout:
                      type: string
                      default: "1800s"
                    network_access:
                      type: array
                      items:
                        type: string
                      default: []
                    tools:
                      type: array
                      items:
                        type: string
                      default: []
                    resources:
                      type: object
                      default: {}
                      properties:
                        cpu:
                          type: string
                          default: "1"
                        memory:
                          type: string
                          default: "512Mi"
                validation:
                  type: object
                  default: {}
                  properties:
                    deterministic:
                      type: array
                      items:
                        type: string
                      default: []
                    agentic:
                      type: array
                      items:
                        type: string
                      default: []
                review:
                  type: object
                  default: {}
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    focus:
                      type: array
                      items:
                        type: string
                      default: []
                loop_policy:
                  type: object
                  default: {}
                  properties:
                    max_retries:
                      type: integer
                      default: 2
                    validator_to_executor:
                      type: boolean
                      default: true
                    reviewer_to_executor:
                      type: boolean
                      default: true
                    reviewer_to_planner:
                      type: boolean
                      default: false
                    on_max_retries:
                      type: string
                      enum:
                        - escalate
                        - abandon
                      default: escalate
                output:
                  type: object
                  default: {}
                  properties:
                    format:
                      type: string
                      enum:
                        - pr
                        - branch
                        - patch
                      default: pr
                    pr:
                      type: object
                      nullable: true
                      properties:
                        title_prefix:
                          type: string
                          default: "nubi:"
                        labels:
                          type: array
                          items:
                            type: string
                          default: []
                        draft:
                          type: boolean
                          default: true
                decomposition:
                  type: object
                  default: {}
                  properties:
                    allow:
                      type: boolean
                      default: false
                    max_depth:
                      type: integer
                      default: 2
                    max_subtasks:
                      type: integer
                      default: 5
                monitoring:
                  type: object
                  default: {}
                  properties:
                    summary:
                      type: boolean
                      default: true
                    notify:
                      type: array
                      items:
                        type: object
                        required:
                          - channel
                          - target
                        properties:
                          channel:
                            type: string
                            enum:
                              - discord
                              - telegram
                              - slack
                          target:
                            type: string
                      default: []
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Planning
                    - Executing
                    - Gating
                    - Validating
                    - Reviewing
                    - Summarizing
                    - Done
                    - Failed
                    - Escalated
                  default: Pending
                phaseChangedAt:
                  type: string
                workspace:
                  type: object
                  properties:
                    namespace:
                      type: string
                    repo:
                      type: string
                    branch:
                      type: string
                    headSHA:
                      type: string
                stages:
                  type: object
                  properties:
                    executor:
                      type: object
                      properties:
                        status:
                          type: string
                        attempts:
                          type: integer
                        commitSHA:
                          type: string
                        summary:
                          type: string
                    validator:
                      type: object
                      properties:
                        status:
                          type: string
                        deterministic:
                          type: object
                          properties:
                            lint:
                              type: string
                            tests:
                              type: string
                            secret_scan:
                              type: string
                        testCommitSHA:
                          type: string
                    reviewer:
                      type: object
                      properties:
                        status:
                          type: string
                        feedback:
                          type: string
                        decision:
                          type: string

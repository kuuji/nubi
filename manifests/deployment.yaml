---
apiVersion: v1
kind: Namespace
metadata:
  name: nubi-system
  labels:
    app.kubernetes.io/managed-by: nubi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nubi-controller
  namespace: nubi-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nubi-controller
rules:
  # CRD access for kopf
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # Manage task namespaces (nubi-* prefix enforced by controller)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # Manage workloads inside task namespaces
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Credentials and config
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Network isolation
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Resource quotas
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # TaskSpec CRD — read and update status
  - apiGroups: ["nubi.io"]
    resources: ["taskspecs"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["nubi.io"]
    resources: ["taskspecs/status"]
    verbs: ["get", "update", "patch"]
  # Events for kopf
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  # kopf peering (leader election)
  - apiGroups: ["kopf.dev"]
    resources: ["clusterkopfpeerings"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nubi-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nubi-controller
subjects:
  - kind: ServiceAccount
    name: nubi-controller
    namespace: nubi-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nubi-controller
  namespace: nubi-system
  labels:
    app.kubernetes.io/name: nubi-controller
    app.kubernetes.io/managed-by: nubi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nubi-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nubi-controller
        app.kubernetes.io/managed-by: nubi
    spec:
      serviceAccountName: nubi-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: ghcr.io/kuuji/nubi-controller:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: NUBI_MASTER_SECRET_NAMESPACE
              value: nubi-system
            - name: NUBI_RUNTIME_CLASS
              value: ""
            - name: NUBI_LLM_PROVIDER
              value: "openai"
            - name: NUBI_MODEL_ID
              value: "moonshotai/kimi-k2"
            - name: NUBI_LLM_BASE_URL
              value: "https://openrouter.ai/api/v1"
            - name: NUBI_AGENT_IMAGE_PULL_POLICY
              value: "IfNotPresent"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
# gVisor RuntimeClass — requires containerd with runsc handler installed on nodes
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc

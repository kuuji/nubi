<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9e44"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#868e96"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e8590c"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e03131"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="720" fill="white" rx="8"/>

  <!-- ═══ You ═══ -->
  <circle cx="360" cy="28" r="18" fill="#e7f5ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="360" y="33" text-anchor="middle" font-size="11" fill="#1971c2" font-weight="600">You</text>

  <!-- Arrow: You → K8s cluster -->
  <line x1="360" y1="46" x2="360" y2="72" stroke="#868e96" stroke-width="1.2" marker-end="url(#arrow-gray)"/>
  <text x="370" y="64" font-size="10" fill="#868e96" stroke="white" stroke-width="4" paint-order="stroke">describes task</text>

  <!-- ═══ Kubernetes Cluster box ═══ -->
  <rect x="50" y="78" width="620" height="540" rx="12" fill="#f0f4ff" stroke="#4263eb" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="68" y="98" font-size="12" fill="#4263eb" font-weight="600">Kubernetes Cluster</text>

  <!-- MCP Server -->
  <rect x="280" y="110" width="160" height="40" rx="6" fill="#e7f5ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="360" y="126" text-anchor="middle" font-size="12" fill="#1971c2" font-weight="500">MCP Server</text>
  <text x="360" y="140" text-anchor="middle" font-size="9" fill="#1971c2">Deployment</text>

  <!-- Arrow: MCP → Controller -->
  <line x1="360" y1="150" x2="360" y2="172" stroke="#868e96" stroke-width="1.2" marker-end="url(#arrow-gray)"/>
  <text x="370" y="165" font-size="10" fill="#868e96" stroke="white" stroke-width="4" paint-order="stroke">TaskSpec CRD</text>

  <!-- Controller -->
  <rect x="300" y="176" width="120" height="40" rx="6" fill="#d0ebff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="360" y="192" text-anchor="middle" font-size="12" fill="#1971c2" font-weight="600">Controller</text>
  <text x="360" y="206" text-anchor="middle" font-size="9" fill="#1971c2">Deployment</text>

  <!-- Arrow: Controller → Pipeline -->
  <line x1="360" y1="216" x2="360" y2="258" stroke="#868e96" stroke-width="1.2" marker-end="url(#arrow-gray)"/>
  <text x="370" y="240" font-size="10" fill="#868e96" stroke="white" stroke-width="4" paint-order="stroke">sets up sandbox</text>

  <!-- ═══ gVisor sandbox box ═══ -->
  <rect x="90" y="262" width="540" height="290" rx="10" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="360" y="282" text-anchor="middle" font-size="11" fill="#868e96">gVisor-sandboxed · isolated namespace</text>

  <!-- Executor (top center of triangle) -->
  <rect x="270" y="296" width="180" height="64" rx="8" fill="#fff4e6" stroke="#e8590c" stroke-width="2"/>
  <text x="360" y="316" text-anchor="middle" font-size="13" fill="#c2410c" font-weight="600">Executor</text>
  <text x="360" y="332" text-anchor="middle" font-size="10" fill="#c2410c">code + tests + gates</text>
  <text x="360" y="350" text-anchor="middle" font-size="9" fill="#adb5bd" font-style="italic">K8s Job</text>

  <!-- Reviewer (bottom-left of triangle) -->
  <rect x="110" y="440" width="200" height="64" rx="8" fill="#ebfbee" stroke="#2f9e44" stroke-width="2"/>
  <text x="210" y="460" text-anchor="middle" font-size="13" fill="#2b8a3e" font-weight="600">Reviewer</text>
  <text x="210" y="476" text-anchor="middle" font-size="10" fill="#2b8a3e">quality · security · coverage</text>
  <text x="210" y="494" text-anchor="middle" font-size="9" fill="#adb5bd" font-style="italic">K8s Job · read-only</text>

  <!-- Monitor (bottom-right of triangle) -->
  <rect x="410" y="440" width="200" height="64" rx="8" fill="#f3f0ff" stroke="#7048e8" stroke-width="2"/>
  <text x="510" y="460" text-anchor="middle" font-size="13" fill="#6741d9" font-weight="600">Monitor</text>
  <text x="510" y="476" text-anchor="middle" font-size="10" fill="#6741d9">creates PR · polls CI</text>
  <text x="510" y="494" text-anchor="middle" font-size="9" fill="#adb5bd" font-style="italic">K8s Job</text>

  <!-- ═══ Happy path arrows (green, solid) ═══ -->

  <!-- Executor → Reviewer (left side of the path) -->
  <path d="M 280 360 C 240 380, 180 400, 170 436" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="178" y="394" font-size="10" fill="#2f9e44" font-weight="500" stroke="white" stroke-width="4" paint-order="stroke">gates pass</text>

  <!-- Reviewer → Monitor -->
  <line x1="310" y1="472" x2="406" y2="472" stroke="#2f9e44" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="340" y="466" font-size="10" fill="#2f9e44" font-weight="500" stroke="white" stroke-width="4" paint-order="stroke">approve</text>

  <!-- ═══ Retry arrows (orange, dashed) ═══ -->

  <!-- Gate retry: self-loop on Executor -->
  <path d="M 450 316 C 490 296, 498 340, 454 338" fill="none" stroke="#e8590c" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text x="496" y="322" font-size="9" fill="#e8590c" stroke="white" stroke-width="4" paint-order="stroke">gates fail</text>

  <!-- Reviewer → Executor (request changes — right side of the path) -->
  <path d="M 250 440 C 290 420, 340 400, 370 364" fill="none" stroke="#e8590c" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text x="320" y="396" font-size="9" fill="#e8590c" stroke="white" stroke-width="4" paint-order="stroke">request changes</text>

  <!-- Monitor → Executor (CI failed) -->
  <path d="M 480 440 C 460 410, 420 380, 400 364" fill="none" stroke="#e8590c" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text x="454" y="394" font-size="9" fill="#e8590c" stroke="white" stroke-width="4" paint-order="stroke">CI failed</text>

  <!-- ═══ BOTTOM: Terminal states ═══ -->

  <!-- Monitor → PR created (green) -->
  <line x1="510" y1="504" x2="510" y2="588" stroke="#2f9e44" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="520" y="556" font-size="10" fill="#2f9e44" font-weight="500" stroke="white" stroke-width="4" paint-order="stroke">approve</text>

  <!-- PR created -->
  <ellipse cx="510" cy="618" rx="70" ry="24" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2"/>
  <text x="510" y="623" text-anchor="middle" font-size="12" fill="#2b8a3e" font-weight="600">PR created</text>

  <!-- Max retries → Escalate (from the sandbox box edge, not a specific agent) -->
  <path d="M 220 552 L 220 588" fill="none" stroke="#e03131" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="130" y="572" font-size="9" fill="#e03131" stroke="white" stroke-width="4" paint-order="stroke">max retries exceeded</text>
  <text x="130" y="584" font-size="9" fill="#e03131" stroke="white" stroke-width="4" paint-order="stroke">or reject</text>

  <!-- Escalate to human -->
  <ellipse cx="220" cy="618" rx="80" ry="24" fill="#fff9db" stroke="#f08c00" stroke-width="1.5"/>
  <text x="220" y="623" text-anchor="middle" font-size="11" fill="#e8590c" font-weight="500">Escalate to human</text>

  <!-- ═══ Legend ═══ -->
  <line x1="140" y1="682" x2="170" y2="682" stroke="#2f9e44" stroke-width="2"/>
  <text x="176" y="686" font-size="10" fill="#495057">happy path</text>

  <line x1="280" y1="682" x2="310" y2="682" stroke="#e8590c" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="316" y="686" font-size="10" fill="#495057">retry (bounded)</text>

  <line x1="440" y1="682" x2="470" y2="682" stroke="#e03131" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="476" y="686" font-size="10" fill="#495057">escalate</text>
</svg>
